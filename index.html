<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Contracts Widget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: transparent;
            padding: 12px;
            color: #1a1a1a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .contract-type-btn {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #374151;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .contract-type-btn:hover {
            border-color: #9ca3af;
            background: #f9fafb;
        }

        .contract-type-btn.active {
            background: #111827;
            color: #ffffff;
            border-color: #111827;
            box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.22);
        }

        .contract-type-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .selected-type-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82em;
            color: #4b5563;
        }

        .selected-type-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid #c7d2fe;
            background: #eef2ff;
            color: #3730a3;
            padding: 3px 10px;
            font-weight: 700;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-header img {
            height: 28px;
            object-fit: contain;
        }

        .card-title {
            font-weight: 700;
            font-size: 0.95em;
            color: #111;
        }

        .card-subtitle {
            font-size: 0.78em;
            color: #666;
            margin-top: 2px;
        }

        .badge {
            margin-left: auto;
            background: #6366f1;
            color: white;
            border-radius: 99px;
            padding: 2px 8px;
            font-size: 0.75em;
            font-weight: 700;
            white-space: nowrap;
        }

        .field {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4px 0;
            font-size: 0.85em;
        }

        .field-label { color: #555; }

        .field-value { font-weight: 600; color: #222; }

        .field-value.price {
            font-size: 1.1em;
            color: #16a34a;
        }

        .empty, .loading {
            text-align: center;
            color: #888;
            padding: 24px;
            font-size: 0.95em;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #e5e7eb;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        .debug-panel {
            position: fixed;
            left: 8px;
            right: 8px;
            bottom: 8px;
            z-index: 9999;
            background: rgba(17, 24, 39, 0.95);
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 11px;
            line-height: 1.35;
            max-height: 40vh;
            overflow: auto;
            white-space: pre-wrap;
        }

        .debug-hidden { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="toolbar" id="contractTypeToolbar" role="tablist" aria-label="Contract type">
        <button class="contract-type-btn active" data-type="Combination" type="button">Combination</button>
        <button class="contract-type-btn" data-type="Electra" type="button">Electra</button>
        <button class="contract-type-btn" data-type="Gas" type="button">Gas</button>
    </div>
    <div class="selected-type-row" aria-live="polite">
        <span>Current selection:</span>
        <span class="selected-type-pill" id="selectedContractTypeLabel">Combination</span>
    </div>
    <div id="root"><div class="loading"><div class="spinner"></div>Loading combination contracts…</div></div>

    <script>
        const FORCE_DEBUG = false;
        const DEBUG_MODE = FORCE_DEBUG
            || new URLSearchParams(globalThis.location.search).get('debug') === '1'
            || globalThis.localStorage?.getItem('energyWidgetDebug') === '1';
        const TOOL_NAME = 'get_cheapest_fixed_energy_contracts';
        const CONTRACT_TYPES = new Set(['Combination', 'Electra', 'Gas']);
        let selectedContractType = 'Combination';
        let requestInFlight = false;
        const debugEvents = [];

        function summarizePayload(value) {
            const parsed = parseMaybeJson(value);
            if (parsed === null) return { type: 'null' };
            const t = typeof parsed;
            if (t !== 'object') return { type: t, value: String(parsed).slice(0, 80) };
            if (Array.isArray(parsed)) return { type: 'array', length: parsed.length };

            return {
                type: 'object',
                keys: Object.keys(parsed).slice(0, 12),
                hasDataRows: Array.isArray(parsed.dataRows),
                hasToolOutput: !!parsed.toolOutput,
                hasStructuredContent: !!parsed.structuredContent,
                hasCallToolResult: !!parsed.call_tool_result,
            };
        }

        function debugLog(label, data) {
            if (!DEBUG_MODE) return;
            const payload = data ? ` ${JSON.stringify(data)}` : '';
            const line = `[${new Date().toISOString()}] ${label}${payload}`;
            debugEvents.push(line);
            if (debugEvents.length > 80) debugEvents.shift();

            let panel = document.getElementById('debug-panel');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'debug-panel';
                panel.className = 'debug-panel';
                document.body.appendChild(panel);
            }

            panel.textContent = debugEvents.join('\n');
        }

        function cellMap(row) {
            const map = {};
            (row.cells || []).forEach(c => { map[c.name] = c; });
            return map;
        }

        function loadingText(type) {
            return `Loading ${String(type || 'contracts').toLowerCase()} contracts…`;
        }

        function setLoading(text) {
            const root = document.getElementById('root');
            root.innerHTML = `<div class="loading"><div class="spinner"></div>${text}</div>`;
        }

        function setContractButtonsDisabled(disabled) {
            const buttons = document.querySelectorAll('.contract-type-btn');
            buttons.forEach((btn) => { btn.disabled = disabled; });
        }

        function updateContractTypeUI() {
            const buttons = document.querySelectorAll('.contract-type-btn');
            buttons.forEach((btn) => {
                const active = btn.dataset.type === selectedContractType;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-selected', active ? 'true' : 'false');
                btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                btn.setAttribute('role', 'tab');
            });

            const selectedLabel = document.getElementById('selectedContractTypeLabel');
            if (selectedLabel) {
                selectedLabel.textContent = selectedContractType;
            }
        }

        function requestContracts(contractType) {
            if (!CONTRACT_TYPES.has(contractType) || requestInFlight) return;

            requestInFlight = true;
            setContractButtonsDisabled(true);
            setLoading(loadingText(contractType));
            debugLog('request_contracts_start', { tool: TOOL_NAME, contractType });

            if (typeof globalThis.openai?.callTool !== 'function') {
                debugLog('request_contracts_calltool_unavailable', {
                    contractType,
                    hasOpenAI: !!globalThis.openai
                });
                requestInFlight = false;
                setContractButtonsDisabled(false);
                return;
            }

            globalThis.openai.callTool(TOOL_NAME, { contractType })
                .then((result) => {
                    const rendered = tryRenderFromAny(result);
                    if (!rendered) {
                        const root = document.getElementById('root');
                        root.innerHTML = '<div class="empty">No contracts found.</div>';
                    }
                    debugLog('request_contracts_done', {
                        contractType,
                        rendered,
                        resultSummary: summarizePayload(result)
                    });
                })
                .catch((error) => {
                    const root = document.getElementById('root');
                    root.innerHTML = '<div class="empty">Could not load contracts. Please try again.</div>';
                    debugLog('request_contracts_error', {
                        contractType,
                        message: String(error?.message || error)
                    });
                })
                .finally(() => {
                    requestInFlight = false;
                    setContractButtonsDisabled(false);
                });
        }

        function setContractType(contractType, triggerFetch = true) {
            if (!CONTRACT_TYPES.has(contractType)) return;
            selectedContractType = contractType;
            updateContractTypeUI();
            debugLog('set_contract_type', { contractType, triggerFetch });
            if (triggerFetch) {
                requestContracts(contractType);
            }
        }

        function setupContractTypeControls() {
            const toolbar = document.getElementById('contractTypeToolbar');
            if (!toolbar) return;

            toolbar.addEventListener('click', (event) => {
                const button = event.target.closest('.contract-type-btn');
                if (!button) return;
                const type = button.dataset.type;
                if (!type || type === selectedContractType) return;
                setContractType(type, true);
            });

            updateContractTypeUI();
        }

        function get(map, name) { return map[name]?.value || ''; }
        function linkUrl(map, name) { return map[name]?.linkUrl || null; }

        function renderCard(row) {
            const d = cellMap(row);
            const providerName = get(d, 'LeverancierName') || 'Energy Contract';
            const logoUrl      = get(d, 'LeverancierLogo');
            const contractName = get(d, 'ContractName');
            const position     = get(d, 'Order');
            const provUrl      = linkUrl(d, 'LeverancierName');

            const fields = [
                { label: 'Maandbedrag',            value: get(d, 'MonthlyPremium'),         price: true },
                { label: 'Stroom per kWh',          value: get(d, 'ElectricityTariff') },
                { label: 'Gas per m³',              value: get(d, 'GasTariff') },
                { label: 'Korting 1e jaar',         value: get(d, 'Discount1stContractYear') },
                { label: 'Korting totaal',          value: get(d, 'Discount') },
            ];

            const fieldsHtml = fields
                .filter(f => f.value)
                .map(f => `<div class="field">
                    <span class="field-label">${f.label}</span>
                    <span class="field-value${f.price ? ' price' : ''}">${f.value}</span>
                </div>`).join('');

            const logoHtml = logoUrl
                ? `<img src="${logoUrl}" alt="${providerName}">`
                : '';

            const nameHtml = provUrl
                ? `<a href="https://www.independer.nl${provUrl}" target="_blank" rel="noopener"
                      style="color:#6366f1;text-decoration:none;">${providerName}</a>`
                : providerName;

            return `<div class="card">
                <div class="card-header">
                    ${logoHtml}
                    <div>
                        <div class="card-title">${nameHtml}</div>
                        <div class="card-subtitle">${contractName}</div>
                    </div>
                    ${position ? `<span class="badge">#${position}</span>` : ''}
                </div>
                ${fieldsHtml}
            </div>`;
        }

        function toRows(data) {
            if (!data) return null;
            if (Array.isArray(data)) return data;
            if (Array.isArray(data.dataRows)) return data.dataRows;
            if (Array.isArray(data.rows)) return data.rows;
            if (Array.isArray(data.contracts)) return data.contracts;
            if (Array.isArray(data.items)) return data.items;
            if (Array.isArray(data.call_tool_result?.dataRows)) return data.call_tool_result.dataRows;
            if (Array.isArray(data.call_tool_result?.rows)) return data.call_tool_result.rows;
            if (Array.isArray(data.call_tool_result?.contracts)) return data.call_tool_result.contracts;
            if (Array.isArray(data.result?.dataRows)) return data.result.dataRows;
            if (Array.isArray(data.result?.rows)) return data.result.rows;
            if (Array.isArray(data.result?.contracts)) return data.result.contracts;
            if (Array.isArray(data.output?.dataRows)) return data.output.dataRows;
            if (Array.isArray(data.structuredContent?.dataRows)) return data.structuredContent.dataRows;
            if (Array.isArray(data.call_tool_result?.structuredContent?.dataRows)) return data.call_tool_result.structuredContent.dataRows;
            return null;
        }

        function parseMaybeJson(value) {
            if (typeof value !== 'string') return value;
            try {
                return JSON.parse(value);
            } catch {
                return value;
            }
        }

        function render(data) {
            const rows = toRows(data);
            const root = document.getElementById('root');
            debugLog('render_called', { rowCount: rows ? rows.length : 0 });

            if (!rows || rows.length === 0) {
                root.innerHTML = '<div class="empty">No contracts found.</div>';
                debugLog('render_empty');
                return;
            }

            root.innerHTML = `<div class="grid">${rows.map(renderCard).join('')}</div>`;
            debugLog('render_success', { rowCount: rows.length });
        }

        function tryRenderFromAny(payload) {
            const contentBlocks = Array.isArray(payload?.content) ? payload.content : [];
            const callToolContentBlocks = Array.isArray(payload?.call_tool_result?.content)
                ? payload.call_tool_result.content
                : [];

            const candidates = [
                payload,
                payload?.params,
                payload?.structuredContent,
                payload?.params?.structuredContent,
                payload?.params?.result,
                payload?.result,
                payload?.call_tool_result,
                payload?.call_tool_result?.structuredContent,
                payload?.toolOutput,
                payload?.output,
                payload?.data,
                payload?.detail?.globals?.toolOutput,
                payload?.detail?.toolOutput,
                ...contentBlocks,
                ...contentBlocks.map(c => c?.structuredContent),
                ...contentBlocks.map(c => c?.data),
                ...contentBlocks.map(c => c?.json),
                ...callToolContentBlocks,
                ...callToolContentBlocks.map(c => c?.structuredContent),
                ...callToolContentBlocks.map(c => c?.data),
                ...callToolContentBlocks.map(c => c?.json),
            ].map(parseMaybeJson);

            for (const candidate of candidates) {
                if (!candidate) continue;
                const rows = toRows(candidate);
                if (rows) {
                    debugLog('candidate_matched', {
                        rowCount: rows.length,
                        summary: summarizePayload(candidate)
                    });
                    render(candidate);
                    return true;
                }
            }

            debugLog('candidate_no_match', { checked: candidates.length });
            return false;
        }

        function notifyReady() {
            debugLog('notify_ready_start', {
                hasOpenAI: !!globalThis.openai,
                hasReadyFn: typeof globalThis.openai?.ready === 'function'
            });

            try {
                if (typeof globalThis.openai?.ready === 'function') {
                    globalThis.openai.ready();
                    debugLog('notify_ready_openai_ready_called');
                }
            } catch {
                // Ignore bridge errors; fallback channels below may still work.
                debugLog('notify_ready_openai_ready_failed');
            }

            try {
                globalThis.parent?.postMessage({
                    jsonrpc: '2.0',
                    method: 'ui/ready',
                    params: {}
                }, '*');
                debugLog('notify_ready_postmessage_sent');
            } catch {
                // Ignore postMessage failures in restricted contexts.
                debugLog('notify_ready_postmessage_failed');
            }
        }

        // --- MCP Apps bridge (postMessage) ---
        globalThis.addEventListener('message', (event) => {
            debugLog('message_event', {
                sourceIsParent: event.source === globalThis.parent,
                summary: summarizePayload(event.data)
            });

            const msg = parseMaybeJson(event.data);
            if (!msg) return;

            // Prefer explicit MCP notification handling, then fall back to generic extraction.
            if (msg.jsonrpc === '2.0' && msg.method === 'ui/notifications/tool-result') {
                if (tryRenderFromAny(msg.params)) return;
            }

            tryRenderFromAny(msg);
        }, { passive: true });

        document.addEventListener('message', (event) => {
            debugLog('document_message_event', { summary: summarizePayload(event.data) });
            const msg = parseMaybeJson(event.data);
            if (!msg) return;
            tryRenderFromAny(msg);
        }, { passive: true });

        // --- Apps SDK legacy (window.openai) ---
        function tryLegacy() {
            const output = globalThis.openai?.toolOutput;
            debugLog('try_legacy', {
                hasOpenAI: !!globalThis.openai,
                hasToolOutput: !!output,
                outputSummary: summarizePayload(output)
            });
            if (output) {
                tryRenderFromAny(output);
            }
        }

        function startLegacyPolling() {
            let attempts = 0;
            const maxAttempts = 80; // ~20s at 250ms
            const interval = globalThis.setInterval(() => {
                attempts += 1;
                const output = globalThis.openai?.toolOutput;

                if (attempts === 1 || attempts % 10 === 0) {
                    debugLog('legacy_poll_tick', {
                        attempts,
                        hasOpenAI: !!globalThis.openai,
                        hasToolOutput: !!output
                    });
                }

                if (output && tryRenderFromAny(output)) {
                    globalThis.clearInterval(interval);
                    debugLog('legacy_poll_success', { attempts });
                    return;
                }

                if (attempts >= maxAttempts) {
                    globalThis.clearInterval(interval);
                    debugLog('legacy_poll_timeout', { attempts });
                }
            }, 250);
        }

        globalThis.addEventListener('openai:set_globals', (event) => {
            const output = event.detail?.globals?.toolOutput ?? globalThis.openai?.toolOutput;
            debugLog('openai_set_globals', {
                hasDetail: !!event.detail,
                hasToolOutput: !!output,
                outputSummary: summarizePayload(output)
            });
            if (output) tryRenderFromAny(output);
        }, { passive: true });

        document.addEventListener('openai:set_globals', (event) => {
            const output = event.detail?.globals?.toolOutput ?? globalThis.openai?.toolOutput;
            debugLog('document_openai_set_globals', {
                hasDetail: !!event.detail,
                hasToolOutput: !!output,
                outputSummary: summarizePayload(output)
            });
            if (output) tryRenderFromAny(output);
        }, { passive: true });

        debugLog('script_loaded', {
            href: globalThis.location.href,
            debugMode: DEBUG_MODE
        });
        setupContractTypeControls();
        notifyReady();
        tryLegacy();
        startLegacyPolling();

        // Tool now requires contractType; default to Combination.
        if (typeof globalThis.openai?.callTool === 'function') {
            requestContracts(selectedContractType);
        }

        globalThis.setTimeout(() => {
            const root = document.getElementById('root');
            const stillLoading = !!root && /Loading contracts/.test(root.textContent || '');
            debugLog('loading_timeout_check', {
                stillLoading,
                hasOpenAI: !!globalThis.openai,
                hasToolOutput: !!globalThis.openai?.toolOutput,
                openAIKeys: globalThis.openai ? Object.keys(globalThis.openai).slice(0, 12) : []
            });
        }, 8000);
    </script>
</body>
</html>
